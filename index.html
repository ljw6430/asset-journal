<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자산² 투자 저널</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--bg4:#22222e;
  --accent:#6c63ff;--accent2:#ff6584;--accent3:#43e97b;--accent4:#f7971e;
  --text:#e8e8f0;--text2:#9999bb;--text3:#55556a;
  --border:#2a2a3a;--border2:#3a3a4e;
  --font:'Noto Sans KR',sans-serif;--mono:'JetBrains Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
.app{display:grid;grid-template-rows:auto 1fr;min-height:100vh}
.header{padding:14px 20px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.header-logo{font-size:17px;font-weight:700;color:var(--accent)}
.header-logo span{color:var(--text2);font-weight:300}
.sync-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(67,233,123,.15);color:var(--accent3);font-weight:500}
.sync-badge.syncing{background:rgba(247,151,30,.15);color:var(--accent4)}
.sync-badge.error{background:rgba(255,101,132,.15);color:var(--accent2)}
.nav{display:flex;gap:4px;flex-wrap:wrap;margin-left:auto}
.nav-btn{padding:5px 12px;border-radius:8px;border:none;background:transparent;color:var(--text2);font-size:12px;font-family:var(--font);cursor:pointer;transition:all .2s}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.active{background:var(--accent);color:#fff;font-weight:500}
.main{padding:16px;overflow-y:auto}
.page{display:none}.page.active{display:block}
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.stat-value{font-size:20px;font-weight:700;font-family:var(--mono)}
.stat-value.up{color:var(--accent3)}.stat-value.down{color:var(--accent2)}.stat-value.neutral{color:var(--accent)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px}
.section{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:13px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:6px}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%}
.dot-purple{background:var(--accent)}.dot-green{background:var(--accent3)}.dot-orange{background:var(--accent4)}.dot-pink{background:var(--accent2)}
.btn{padding:6px 12px;border-radius:8px;border:none;font-family:var(--font);font-size:12px;cursor:pointer;transition:all .2s;font-weight:500}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{opacity:.85}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-sm{padding:3px 9px;font-size:11px}
.btn-danger{background:transparent;color:var(--accent2);border:1px solid var(--border)}.btn-danger:hover{background:rgba(255,101,132,.1)}
.form-row{display:grid;gap:10px;margin-bottom:10px}
.form-row.c2{grid-template-columns:1fr 1fr}.form-row.c3{grid-template-columns:1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:11px;color:var(--text2);font-weight:500}
.form-input{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:border .2s;width:100%}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--text3)}
select.form-input option{background:var(--bg3)}
textarea.form-input{resize:vertical;min-height:75px;line-height:1.6}
.tag{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500}
.tag-buy{background:rgba(67,233,123,.15);color:var(--accent3)}
.tag-sell{background:rgba(255,101,132,.15);color:var(--accent2)}
.tag-hold{background:rgba(108,99,255,.15);color:var(--accent)}
.table{width:100%;border-collapse:collapse}
.table th{font-size:11px;color:var(--text3);text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.05em}
.table td{padding:9px 10px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)}
.table tr:last-child td{border-bottom:none}
.table tr:hover td{background:rgba(255,255,255,.02)}
.asset-name{color:var(--text);font-weight:500}
.jcard{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px}
.jcard-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.jcard-title{font-size:13px;font-weight:500;color:var(--text);flex:1}
.jsec{margin-bottom:8px}
.jsec-label{font-size:10px;color:var(--text3);font-weight:500;margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em}
.jsec-body{font-size:12px;color:var(--text2);line-height:1.7;white-space:pre-wrap;background:var(--bg4);padding:9px 11px;border-radius:7px}
.jsec-body.review{background:rgba(108,99,255,.08);border-left:3px solid var(--accent)}
.jsec-body.scenario{background:rgba(247,151,30,.08);border-left:3px solid var(--accent4)}
.ncard{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.ncard-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;flex-wrap:wrap;gap:5px}
.ncard-title{font-size:13px;font-weight:500;color:var(--text)}
.ncard-body{font-size:12px;color:var(--text2);line-height:1.7;white-space:pre-wrap}
.nkey{display:inline-block;background:rgba(108,99,255,.15);color:var(--accent);font-size:10px;padding:2px 7px;border-radius:20px;margin:2px}
.pbar{height:9px;border-radius:20px;background:var(--bg4);overflow:hidden;display:flex;margin:7px 0}
.bseg{height:100%}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:7px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
.ldot{width:7px;height:7px;border-radius:50%}
.gcard{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px}
.gtitle{font-size:11px;color:var(--text3);margin-bottom:7px;text-transform:uppercase;letter-spacing:.05em}
.gamount{font-size:22px;font-weight:700;font-family:var(--mono);color:var(--accent);margin-bottom:3px}
.gdesc{font-size:11px;color:var(--text2);line-height:1.5;white-space:pre-line}
.prgbar{height:5px;background:var(--bg4);border-radius:20px;margin-top:9px;overflow:hidden}
.prgfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:20px}
.prcard{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:7px;display:flex;align-items:flex-start;gap:10px}
.prnum{font-size:18px;font-weight:700;color:var(--accent);font-family:var(--mono);min-width:24px}
.prtext{font-size:12px;color:var(--text2);line-height:1.6;flex:1}
.wcard{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.wcard-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.wstatus{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.sw{background:rgba(247,151,30,.15);color:var(--accent4)}
.sb{background:rgba(67,233,123,.15);color:var(--accent3)}
.ss{background:rgba(255,101,132,.15);color:var(--accent2)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;width:92%;max-width:520px;max-height:88vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:15px;font-weight:600;color:var(--text)}
.modal-close{background:transparent;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:3px 7px;border-radius:5px}
.modal-close:hover{background:var(--bg3)}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.scat{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:all .2s}
.scat:hover{border-color:var(--border2);transform:translateY(-1px)}
.scat-icon{font-size:18px;margin-bottom:6px}
.scat-title{font-size:12px;font-weight:500;color:var(--text);margin-bottom:3px}
.scat-cnt{font-size:10px;color:var(--accent);font-family:var(--mono)}
.chk-item{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--border)}
.chk-item:last-child{border-bottom:none}
@media(max-width:600px){.dash-grid{grid-template-columns:1fr 1fr}.sgrid{grid-template-columns:1fr 1fr}.form-row.c3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <div class="header-logo">자산²<span> 투자 저널</span></div>
  <span class="sync-badge" id="sync-badge">● 연결 중...</span>
  <nav class="nav">
    <button class="nav-btn active" id="nav-dash">대시보드</button>
    <button class="nav-btn" id="nav-journal">투자일지</button>
    <button class="nav-btn" id="nav-study">공부노트</button>
    <button class="nav-btn" id="nav-port">포트폴리오</button>
    <button class="nav-btn" id="nav-watch">관찰종목</button>
    <button class="nav-btn" id="nav-goal">목표&원칙</button>
  </nav>
</div>
<div class="main">

<div class="page active" id="page-dash">
  <div class="dash-grid" id="d-stats"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
    <div class="section">
      <div class="section-header"><div class="section-title"><span class="dot dot-purple"></span>최근 투자일지</div><button class="btn btn-ghost btn-sm" id="btn-more-j">전체</button></div>
      <div id="d-rj"></div>
    </div>
    <div class="section">
      <div class="section-header"><div class="section-title"><span class="dot dot-green"></span>최근 공부노트</div><button class="btn btn-ghost btn-sm" id="btn-more-s">전체</button></div>
      <div id="d-rs"></div>
    </div>
  </div>
  <div class="section">
    <div class="section-header"><div class="section-title"><span class="dot dot-orange"></span>오늘의 체크리스트</div></div>
    <div id="d-chk"></div>
  </div>
</div>

<div class="page" id="page-journal">
  <div class="section">
    <div class="section-header"><div class="section-title"><span class="dot dot-purple"></span>투자 매매일지</div><button class="btn btn-primary btn-sm" id="btn-new-j">+ 새 일지</button></div>
    <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">
      <button class="btn btn-ghost btn-sm" id="fj-all" style="border-color:var(--accent);color:var(--accent)">전체</button>
      <button class="btn btn-ghost btn-sm" id="fj-매수">매수</button>
      <button class="btn btn-ghost btn-sm" id="fj-매도">매도</button>
      <button class="btn btn-ghost btn-sm" id="fj-분석">분석</button>
    </div>
    <div id="j-list"></div>
  </div>
</div>

<div class="page" id="page-study">
  <div class="section">
    <div class="section-header"><div class="section-title"><span class="dot dot-green"></span>공부 노트</div><button class="btn btn-primary btn-sm" id="btn-new-s">+ 새 노트</button></div>
    <div class="sgrid" id="s-cats"></div>
  </div>
  <div class="section" id="s-detail" style="display:none">
    <div class="section-header"><div class="section-title" id="s-dtitle"></div><button class="btn btn-ghost btn-sm" id="btn-back-cats">← 뒤로</button></div>
    <div id="s-notes"></div>
  </div>
</div>

<div class="page" id="page-port">
  <div class="section">
    <div class="section-header"><div class="section-title"><span class="dot dot-orange"></span>자산 배분</div><button class="btn btn-primary btn-sm" id="btn-new-p">+ 추가</button></div>
    <div class="pbar" id="p-bar"></div>
    <div class="legend" id="p-leg"></div>
    <div style="margin-top:14px;overflow-x:auto">
      <table class="table">
        <thead><tr><th>자산</th><th>분류</th><th>매수금</th><th>현재금</th><th>수익률</th><th>비중</th><th></th></tr></thead>
        <tbody id="p-tbl"></tbody>
      </table>
    </div>
    <div style="background:rgba(247,151,30,.1);border:1px solid rgba(247,151,30,.3);border-radius:9px;padding:10px 14px;margin-top:12px;font-size:12px;color:var(--accent4)">
      ⚠️ 비트마인 약 75% 집중 — 의도적 선택이지만 항상 인식할 것
    </div>
  </div>
</div>

<div class="page" id="page-watch">
  <div class="section">
    <div class="section-header"><div class="section-title"><span class="dot dot-pink"></span>관찰 종목</div><button class="btn btn-primary btn-sm" id="btn-new-w">+ 추가</button></div>
    <div id="w-list"></div>
  </div>
</div>

<div class="page" id="page-goal">
  <div class="section">
    <div class="section-header"><div class="section-title"><span class="dot dot-pink"></span>투자 목표</div><button class="btn btn-ghost btn-sm" id="btn-edit-g">수정</button></div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px" id="g-cards"></div>
  </div>
  <div class="section">
    <div class="section-header"><div class="section-title"><span class="dot dot-purple"></span>투자 원칙</div><button class="btn btn-ghost btn-sm" id="btn-new-pr">+ 추가</button></div>
    <div id="pr-list"></div>
  </div>
  <div class="section">
    <div class="section-header"><div class="section-title"><span class="dot dot-orange"></span>종목별 매도 기준</div></div>
    <div id="ex-list"></div>
  </div>
</div>
</div>
</div>

<!-- 모달들 -->
<div class="modal-overlay" id="jm">
<div class="modal">
  <div class="modal-header"><div class="modal-title">투자 일지 작성</div><button class="modal-close" id="close-jm">×</button></div>
  <div class="form-row c2">
    <div class="form-group"><label class="form-label">날짜</label><input type="date" class="form-input" id="jd"></div>
    <div class="form-group"><label class="form-label">구분</label><select class="form-input" id="jt"><option>매수</option><option>매도</option><option>관망</option><option>분석</option></select></div>
  </div>
  <div class="form-row c2">
    <div class="form-group"><label class="form-label">종목명</label><input type="text" class="form-input" id="ja" placeholder="예: 엔비디아, 비트마인"></div>
    <div class="form-group"><label class="form-label">자산유형</label><select class="form-input" id="jc"><option>미국주식</option><option>국내주식</option><option>ETF</option><option>암호화폐</option><option>기타</option></select></div>
  </div>
  <div class="form-row c3">
    <div class="form-group"><label class="form-label">가격</label><input type="number" class="form-input" id="jp"></div>
    <div class="form-group"><label class="form-label">수량</label><input type="number" class="form-input" id="jq"></div>
    <div class="form-group"><label class="form-label">수익률(%)</label><input type="number" class="form-input" id="jpr"></div>
  </div>
  <div class="form-group" style="margin-bottom:10px"><label class="form-label">매매 근거</label><textarea class="form-input" id="jr" placeholder="탑다운: 매크로→섹터→종목"></textarea></div>
  <div class="form-group" style="margin-bottom:10px"><label class="form-label">시나리오</label><textarea class="form-input" id="js" placeholder="상승/하락/손절 기준"></textarea></div>
  <div class="form-group" style="margin-bottom:14px"><label class="form-label">복기 & 배운 점</label><textarea class="form-input" id="jrv"></textarea></div>
  <div style="display:flex;gap:8px;justify-content:flex-end">
    <button class="btn btn-ghost" id="cancel-jm">취소</button>
    <button class="btn btn-primary" id="save-jm">저장</button>
  </div>
</div>
</div>

<div class="modal-overlay" id="sm">
<div class="modal">
  <div class="modal-header"><div class="modal-title">공부 노트 추가</div><button class="modal-close" id="close-sm">×</button></div>
  <div class="form-row c2">
    <div class="form-group"><label class="form-label">카테고리</label>
      <select class="form-input" id="sc">
        <option>매크로 & 경제지표</option><option>기술적 분석</option><option>종목 & 섹터 분석</option>
        <option>심리 & 리스크관리</option><option>암호화폐</option><option>ETF & 채권</option>
        <option>데일리 리포트 정리</option><option>애널리스트 의견</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">제목</label><input type="text" class="form-input" id="st"></div>
  </div>
  <div class="form-group" style="margin-bottom:10px"><label class="form-label">내용</label><textarea class="form-input" id="sb" style="min-height:110px"></textarea></div>
  <div class="form-group" style="margin-bottom:14px"><label class="form-label">키워드 (쉼표 구분)</label><input type="text" class="form-input" id="sk"></div>
  <div style="display:flex;gap:8px;justify-content:flex-end">
    <button class="btn btn-ghost" id="cancel-sm">취소</button>
    <button class="btn btn-primary" id="save-sm">저장</button>
  </div>
</div>
</div>

<div class="modal-overlay" id="pm">
<div class="modal">
  <div class="modal-header"><div class="modal-title">자산 추가</div><button class="modal-close" id="close-pm">×</button></div>
  <div class="form-row c2">
    <div class="form-group"><label class="form-label">자산명</label><input type="text" class="form-input" id="pn"></div>
    <div class="form-group"><label class="form-label">분류</label><select class="form-input" id="pc"><option>미국주식</option><option>국내주식</option><option>ETF</option><option>암호화폐</option><option>현금</option><option>부동산</option></select></div>
  </div>
  <div class="form-row c2">
    <div class="form-group"><label class="form-label">매수금액(원)</label><input type="number" class="form-input" id="pb"></div>
    <div class="form-group"><label class="form-label">현재금액(원)</label><input type="number" class="form-input" id="pw"></div>
  </div>
  <div style="display:flex;gap:8px;justify-content:flex-end">
    <button class="btn btn-ghost" id="cancel-pm">취소</button>
    <button class="btn btn-primary" id="save-pm">저장</button>
  </div>
</div>
</div>

<div class="modal-overlay" id="wm">
<div class="modal">
  <div class="modal-header"><div class="modal-title">관찰 종목 추가</div><button class="modal-close" id="close-wm">×</button></div>
  <div class="form-row c2">
    <div class="form-group"><label class="form-label">종목명</label><input type="text" class="form-input" id="wn"></div>
    <div class="form-group"><label class="form-label">상태</label><select class="form-input" id="ws"><<option>보유 중</option><option>이벤트 대기</option><option>매수 검토</option><option>매도 검토</option></select></div>
  </div>
  <div class="form-group" style="margin-bottom:10px"><label class="form-label">이벤트 / 대기 조건</label><textarea class="form-input" id="we"></textarea></div>

// ── Firestore CRUD ──
async function fsSet(col, id, data) {
  try { await db.collection(col).doc(id).set(data); return true; }
  catch(e) { console.error('fsSet error:', e); return false; }
}
async function fsGetAll(col) {
  try {
    const snap = await db.collection(col).get();
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch(e) { console.error('fsGetAll error:', e); return []; }
}
async function fsDel(col, id) {
  try { await db.collection(col).doc(id).delete(); return true; }
  catch(e) { console.error('fsDel error:', e); return false; }
}

async function init() {
  setBadge('saving', '● 불러오는 중...');
  const cols = ['journals','studies','portfolios','goals','principles','watchlist'];
  let hasData = false;
  for (const col of cols) {
    const data = await fsGetAll(col);
    if (data.length > 0) { DB[col] = data; hasData = true; }
  }
  if (!hasData) {
    setBadge('saving', '● 초기 데이터 저장 중...');
    for (const col of cols) {
      for (const item of INIT_DATA[col]) {
        await fsSet(col, item.id, item);
      }
      DB[col] = [...INIT_DATA[col]];
    }
  }
  setBadge('connected');
  setupEvents();
  renderDash();
}

  document.getElementById('page-'+id).classList.add('active');

  if(id==='journal') renderJ('all');

  if(id==='port') renderPort();
  if(id==='watch') renderWatch();
  if(id==='goal') renderGoal();
}

    <div class="stat-card"><div class="stat-label">일지 / 노트</div><div class="stat-value neutral">${DB.journals.length} / ${DB.studies.length}</div><div class="stat-sub">오늘도 기록하자</div></div>
  `;
  document.getElementById('d-rj').innerHTML = [...DB.journals].reverse().slice(0,2).map(j=>`
    <div style="padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="display:flex;align-items:center;gap:7px;margin-bottom:3px">
        <span class="tag tag-${j.type==='매수'?'buy':j.type==='매도'?'sell':'hold'}">${j.type}</span>
        <span style="font-size:12px;font-weight:500;color:var(--text);flex:1">${j.asset}</span>
        <span style="font-size:10px;color:var(--text3)">${j.date}</span>
      </div>
      <div style="font-size:11px;color:var(--text2)">${(j.reason||'').split('\n')[0].slice(0,55)}...</div>
    </div>
  `).join('') || '<div style="color:var(--text3);font-size:12px;padding:10px 0">일지가 없어요</div>';
  document.getElementById('d-rs').innerHTML = [...DB.studies].reverse().slice(0,2).map(s=>`
    <div style="padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="font-size:12px;font-weight:500;color:var(--text);margin-bottom:2px">${s.title}</div>
      <div style="font-size:10px;color:var(--text3)">${s.cat} · ${s.date||''}</div>
    </div>
  `).join('') || '<div style="color:var(--text3);font-size:12px;padding:10px 0">노트가 없어요</div>';
  document.getElementById('d-chk').innerHTML = CHKLIST.map((c,i)=>`
    <div class="chk-item">
      <input type="checkbox" id="ck${i}" style="accent-color:var(--accent);width:15px;height:15px;cursor:pointer">
      <label for="ck${i}" style="font-size:12px;color:var(--text2);cursor:pointer">${c}</label>
    </div>
  `).join('');
}

function renderJ(filter) {
  const data = filter==='all' ? [...DB.journals].reverse() : [...DB.journals].filter(j=>j.type===filter).reverse();
  document.getElementById('j-list').innerHTML = data.length ? data.map(j=>`
    <div class="jcard">
      <div class="jcard-header">
        <span class="tag tag-${j.type==='매수'?'buy':j.type==='매도'?'sell':'hold'}">${j.type}</span>
        <span class="jcard-title">${j.asset} <span style="color:var(--text3);font-size:11px">(${j.category})</span></span>
        ${j.profit?`<span style="font-family:var(--mono);font-size:11px;padding:2px 7px;border-radius:5px;background:${Number(j.profit)>0?'rgba(67,233,123,.15)':'rgba(255,101,132,.15)'};color:${Number(j.profit)>0?'var(--accent3)':'var(--accent2)'}">${Number(j.profit)>0?'+':''}${j.profit}%</span>`:''}
        <span style="font-size:10px;color:var(--text3);font-family:var(--mono)">${j.date}</span>
        <button class="btn btn-danger btn-sm" data-id="${j.id}" data-action="delJ">삭제</button>
      </div>
      ${j.reason?`<div class="jsec"><div class="jsec-label">매매 근거</div><div class="jsec-body">${j.reason}</div></div>`:''}
      ${j.scenario?`<div class="jsec"><div class="jsec-label">시나리오</div><div class="jsec-body scenario">${j.scenario}</div></div>`:''}
      ${j.review?`<div class="jsec"><div class="jsec-label">복기</div><div class="jsec-body review">${j.review}</div></div>`:''}
    </div>
  `).join('') : '<div style="color:var(--text3);font-size:12px;padding:18px;text-align:center">일지가 없어요</div>';
}

function filterJ(t) {
  document.querySelectorAll('[id^="fj-"]').forEach(b => { b.style.borderColor=''; b.style.color=''; });
  const b = document.getElementById('fj-'+t);
  if(b) { b.style.borderColor='var(--accent)'; b.style.color='var(--accent)'; }
  renderJ(t);
}

function renderStudy() {
  document.getElementById('s-detail').style.display = 'none';
  const el = document.getElementById('s-cats');
  el.style.display = 'grid';
  el.innerHTML = CATS.map(c => {
    const cnt = DB.studies.filter(s=>s.cat===c.title).length;
    return `<div class="scat" data-cat="${c.title}" data-icon="${c.icon}">
      <div class="scat-icon">${c.icon}</div>
      <div class="scat-title">${c.title}</div>
      <div class="scat-cnt">${cnt}개의 노트</div>
    </div>`;
  }).join('');
  document.querySelectorAll('.scat').forEach(el => {
    el.addEventListener('click', () => openCat(el.dataset.cat, el.dataset.icon));
  });
}

function openCat(cat, icon) {
  document.getElementById('s-cats').style.display = 'none';
  document.getElementById('s-detail').style.display = 'block';
  document.getElementById('s-dtitle').innerHTML = `<span class="dot dot-green"></span>${icon} ${cat}`;
  const notes = DB.studies.filter(s=>s.cat===cat).reverse();
  document.getElementById('s-notes').innerHTML = notes.length ? notes.map(n=>`
    <div class="ncard">
      <div class="ncard-header">
        <span class="ncard-title">${n.title}</span>
        <div style="display:flex;align-items:center;gap:7px">
          <span style="font-size:10px;color:var(--text3)">${n.date||''}</span>
          <button class="btn btn-danger btn-sm" data-id="${n.id}" data-action="delS">삭제</button>
        </div>
      </div>
      <div class="ncard-body">${n.body}</div>
      ${n.keys?`<div style="margin-top:7px">${n.keys.split(',').map(k=>`<span class="nkey">${k.trim()}</span>`).join('')}</div>`:''}
    </div>
  `).join('') : '<div style="color:var(--text3);font-size:12px;padding:18px;text-align:center">노트가 없어요</div>';
}

function renderPort() {
  const total = DB.portfolios.reduce((a,p)=>a+Number(p.now),0);
  const catT = {};
  DB.portfolios.forEach(p => { catT[p.cat] = (catT[p.cat]||0) + Number(p.now); });
  document.getElementById('p-bar').innerHTML = Object.entries(catT).map(([c,v])=>`<div class="bseg" style="width:${total?(v/total*100).toFixed(1):0}%;background:${PALETTE[c]||'#6c63ff'}"></div>`).join('');
  document.getElementById('p-leg').innerHTML = Object.entries(catT).map(([c,v])=>`<div class="legend-item"><div class="ldot" style="background:${PALETTE[c]||'#6c63ff'}"></div>${c} ${total?(v/total*100).toFixed(1):0}%</div>`).join('');
  document.getElementById('p-tbl').innerHTML = DB.portfolios.map(p => {
    const ret = p.buy>0 ? ((p.now-p.buy)/p.buy*100).toFixed(2) : 0;
    const w = total ? (p.now/total*100).toFixed(1) : 0;
    return `<tr>
      <td><span class="asset-name">${p.name}</span></td>
      <td><span class="tag tag-hold">${p.cat}</span></td>
      <td style="font-family:var(--mono)">${Number(p.buy).toLocaleString()}</td>
      <td style="font-family:var(--mono)">${Number(p.now).toLocaleString()}</td>
      <td style="font-family:var(--mono);color:${ret>0?'var(--accent3)':ret<0?'var(--accent2)':'var(--text2)'}">${ret>0?'+':''}${ret}%</td>
      <td style="font-family:var(--mono)">${w}%</td>
      <td><button class="btn btn-danger btn-sm" data-id="${p.id}" data-action="delP">삭제</button></td>
    </tr>`;
  }).join('');
}

function renderWatch() {
  document.getElementById('w-list').innerHTML = DB.watchlist.length ? DB.watchlist.map(w=>`
    <div class="wcard">
      <div class="wcard-header">
        <span style="font-size:14px;font-weight:600;color:var(--text);flex:1">${w.name}</span>
        <span class="wstatus ${w.status==='이벤트 대기'?'sw':w.status==='매수 검토'?'sb':'ss'}">${w.status}</span>
        <button class="btn btn-danger btn-sm" data-id="${w.id}" data-action="delW">삭제</button>
      </div>
      ${w.event?`<div style="margin-bottom:9px"><div style="font-size:10px;color:var(--text3);margin-bottom:3px">이벤트</div><div style="font-size:12px;color:var(--text2);white-space:pre-wrap;background:var(--bg4);padding:8px;border-radius:7px">${w.event}</div></div>`:''}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${w.buy?`<div><div style="font-size:10px;color:var(--accent3);margin-bottom:3px">매수 조건</div><div style="font-size:11px;color:var(--text2);white-space:pre-wrap;background:rgba(67,233,123,.08);padding:7px;border-radius:7px">${w.buy}</div></div>`:''}
        ${w.sell?`<div><div style="font-size:10px;color:var(--accent2);margin-bottom:3px">매도 조건</div><div style="font-size:11px;color:var(--text2);white-space:pre-wrap;background:rgba(255,101,132,.08);padding:7px;border-radius:7px">${w.sell}</div></div>`:''}
      </div>
    </div>
  `).join('') : '<div style="color:var(--text3);font-size:12px;padding:18px;text-align:center">관찰 종목이 없어요</div>';
}

function renderGoal() {
  const types = ['1단계 목표','2단계 목표','최종 목표'];
  document.getElementById('g-cards').innerHTML = types.map(t => {
    const g = DB.goals.find(x=>x.type===t);
    if(!g) return `<div class="gcard"><div class="gtitle">${t}</div><div style="color:var(--text3);font-size:12px;margin-top:7px">미설정</div></div>`;
    const pct = g.amount>0 ? Math.min((g.current/g.amount*100),100).toFixed(1) : 0;
    return `<div class="gcard">
      <div class="gtitle">${t}</div>
      <div class="gamount">${Number(g.amount).toLocaleString()}원</div>
      <div class="gdesc">${g.desc||''}</div>
      <div class="prgbar"><div class="prgfill" style="width:${pct}%"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:5px">
        <span>현재 ${Number(g.current).toLocaleString()}원</span><span>${pct}%</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('pr-list').innerHTML = DB.principles.length ? DB.principles.map((p,i)=>`
    <div class="prcard">
      <div class="prnum">${i+1}</div>
      <div class="prtext">${p.text}</div>
      <button class="btn btn-danger btn-sm" data-id="${p.id}" data-action="delPR">삭제</button>
    </div>
  `).join('') : '<div style="color:var(--text3);font-size:12px;padding:18px;text-align:center">원칙을 추가해보세요</div>';
  document.getElementById('ex-list').innerHTML = EXIT_RULES.map(r=>`
    <div style="margin-bottom:14px">
      <div style="font-size:12px;font-weight:600;color:var(--accent);margin-bottom:7px">${r.asset}</div>
      ${r.rules.map(rule=>`<div style="display:flex;gap:7px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)"><span style="color:var(--accent2)">→</span>${rule}</div>`).join('')}
    </div>
  `).join('');
}

// ── 이벤트 위임 (동적 삭제 버튼) ──
document.addEventListener('click', async function(e) {
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const action = btn.dataset.action;
  const id = btn.dataset.id;
  if(!confirm('삭제할까요?')) return;
  setBadge('saving');
  if(action==='delJ') { await fsDel('journals',id); DB.journals=DB.journals.filter(j=>j.id!==id); setBadge('connected'); renderJ('all'); }
  if(action==='delS') { await fsDel('studies',id); DB.studies=DB.studies.filter(s=>s.id!==id); setBadge('connected'); renderStudy(); }
  if(action==='delP') { await fsDel('portfolios',id); DB.portfolios=DB.portfolios.filter(p=>p.id!==id); setBadge('connected'); renderPort(); }
  if(action==='delW') { await fsDel('watchlist',id); DB.watchlist=DB.watchlist.filter(w=>w.id!==id); setBadge('connected'); renderWatch(); }
  if(action==='delPR') { await fsDel('principles',id); DB.principles=DB.principles.filter(p=>p.id!==id); setBadge('connected'); renderGoal(); }
});

// ── CRUD 저장 함수 ──
async function saveJ() {
  const d = {
    id:uid(), date:document.getElementById('jd').value, type:document.getElementById('jt').value,
    asset:document.getElementById('ja').value, category:document.getElementById('jc').value,
    price:document.getElementById('jp').value, qty:document.getElementById('jq').value,
    profit:document.getElementById('jpr').value, reason:document.getElementById('jr').value,
    scenario:document.getElementById('js').value, review:document.getElementById('jrv').value
  };
  if(!d.asset) { alert('종목명을 입력해주세요'); return; }
  setBadge('saving');
  const ok = await fsSet('journals', d.id, d);
  if(ok) { DB.journals.push(d); setBadge('connected'); closeM('jm'); renderJ('all'); }
  else { setBadge('error'); alert('저장 실패. Firebase 규칙을 확인해주세요.'); }
  ['jd','ja','jp','jq','jpr','jr','js','jrv'].forEach(id => { const e=document.getElementById(id); if(e) e.value=''; });
}

async function saveS() {
  const d = {
    id:uid(), cat:document.getElementById('sc').value, title:document.getElementById('st').value,
    body:document.getElementById('sb').value, keys:document.getElementById('sk').value,
    date:new Date().toLocaleDateString('ko-KR')
  };
  if(!d.title||!d.body) { alert('제목과 내용을 입력해주세요'); return; }
  setBadge('saving');
  const ok = await fsSet('studies', d.id, d);
  if(ok) {
    DB.studies.push(d); setBadge('connected'); closeM('sm');
    const cat=d.cat; const icon=CATS.find(c=>c.title===cat)?.icon||'📝';
    renderStudy(); setTimeout(()=>openCat(cat,icon),100);
  } else { setBadge('error'); alert('저장 실패. Firebase 규칙을 확인해주세요.'); }
  ['st','sb','sk'].forEach(id => document.getElementById(id).value='');
}

async function saveP() {
  const d = { id:uid(), name:document.getElementById('pn').value, cat:document.getElementById('pc').value, buy:document.getElementById('pb').value, now:document.getElementById('pw').value };
  if(!d.name) { alert('자산명을 입력해주세요'); return; }
  setBadge('saving');
  const ok = await fsSet('portfolios', d.id, d);
  if(ok) { DB.portfolios.push(d); setBadge('connected'); closeM('pm'); renderPort(); }
  else { setBadge('error'); alert('저장 실패. Firebase 규칙을 확인해주세요.'); }
  ['pn','pb','pw'].forEach(id => document.getElementById(id).value='');
}

async function saveW() {
  const d = { id:uid(), name:document.getElementById('wn').value, status:document.getElementById('ws').value, event:document.getElementById('we').value, buy:document.getElementById('wb').value, sell:document.getElementById('wsl').value };
  if(!d.name) { alert('종목명을 입력해주세요'); return; }
  setBadge('saving');
  const ok = await fsSet('watchlist', d.id, d);
  if(ok) { DB.watchlist.push(d); setBadge('connected'); closeM('wm'); renderWatch(); }
  else { setBadge('error'); alert('저장 실패. Firebase 규칙을 확인해주세요.'); }
  ['wn','we','wb','wsl'].forEach(id => document.getElementById(id).value='');
}

async function saveG() {
  const type = document.getElementById('gt').value;
  const d = { id:uid(), type, amount:document.getElementById('ga').value, current:document.getElementById('gcur').value, desc:document.getElementById('gd').value };
  setBadge('saving');
  const idx = DB.goals.findIndex(g=>g.type===type);
  if(idx>-1) { await fsDel('goals', DB.goals[idx].id); DB.goals[idx]=d; }
  else DB.goals.push(d);
  const ok = await fsSet('goals', d.id, d);
  if(ok) { setBadge('connected'); closeM('gm'); renderGoal(); }
  else setBadge('error');
}

async function savePR() {
  const t = document.getElementById('prt').value;
  if(!t) return;
  const d = { id:uid(), text:t };
  setBadge('saving');
  const ok = await fsSet('principles', d.id, d);
  if(ok) { DB.principles.push(d); setBadge('connected'); closeM('prm'); renderGoal(); }
  else setBadge('error');
  document.getElementById('prt').value='';
}

// 시작!
init();
</script>
</body>
</html>
